<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Concesionario BYD - Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 420px;
      height: 680px;
      background: #111;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid #222;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #333;
    }

    .header-logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-info h2 {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
    }

    .header-info span {
      color: #4ade80;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-info span::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot {
      background: #1e1e2e;
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2d2d3d;
    }

    .message.user {
      background: linear-gradient(135deg, #0072ff, #00c6ff);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e2e;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      border: 1px solid #2d2d3d;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 8px;
    }

    .quick-btn {
      background: #1e1e2e;
      color: #93c5fd;
      border: 1px solid #2d4a7a;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: #0072ff;
      color: #fff;
      border-color: #0072ff;
    }

    .input-area {
      padding: 12px 16px;
      background: #0d0d0d;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 24px;
      padding: 10px 16px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #0072ff;
    }

    .input-area input::placeholder { color: #555; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #0072ff, #00c6ff);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.08); }

    .send-btn svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-logo">🚗</div>
      <div class="header-info">
        <h2>Concesionario BYD</h2>
        <span>Asistente en línea</span>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="quick-replies" id="quickReplies">
      <button class="quick-btn" onclick="sendQuick('Ver catálogo')">🚗 Ver catálogo</button>
      <button class="quick-btn" onclick="sendQuick('Quiero financiamiento')">💳 Financiamiento</button>
      <button class="quick-btn" onclick="sendQuick('Precio del BYD Seal')">💰 Precios</button>
      <button class="quick-btn" onclick="sendQuick('Quiero una prueba de manejo')">🔑 Test drive</button>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off" />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const RASA_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:5005/webhooks/rest/webhook'
      : 'https://byd-chatbot-production.up.railway.app/webhooks/rest/webhook';
    const SESSION_ID = 'user_' + Math.random().toString(36).substr(2, 9);
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');

    window.onload = () => {
      sendToRasa('hola');
      inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    };

    function sendQuick(text) {
      addMessage(text, 'user');
      sendToRasa(text);
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      addMessage(text, 'user');
      sendToRasa(text);
    }

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendToRasa(message) {
      showTyping();
      try {
        const res = await fetch(RASA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender: SESSION_ID, message })
        });
        const data = await res.json();
        hideTyping();
        if (data.length === 0) {
          addMessage('Lo siento, no entendí eso. ¿Puedes reformularlo?', 'bot');
        } else {
          data.forEach((msg, i) => {
            setTimeout(() => addMessage(msg.text, 'bot'), i * 300);
          });
        }
      } catch (err) {
        hideTyping();
        console.error('Error conectando con Rasa:', err);
        addMessage('⚠️ Servidor no disponible. Error: ' + err.message, 'bot');
      }
    }
  </script>
</body>
</html>
